<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Wasit</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .state-info {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.1rem;
            color: var(--text-main);
        }
        .sets-info {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }
        .set-badge {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            padding: 5px 15px;
            border-radius: 12px;
            font-weight: bold;
            border: 1px solid rgba(251, 191, 36, 0.4);
        }
    </style>
</head>
<body>

    <!-- Section Login -->
    <div class="glass-card" id="loginSection">
        <h1 class="title">Otorisasi Wasit</h1>
        <p class="subtitle">Panel ini dikhususkan untuk perangkat pertandingan</p>
        <div class="form-group">
            <input type="password" id="passwordInput" class="form-control" placeholder="Masukkan Password Rahasia">
        </div>
        <button class="btn btn-primary" onclick="login()">Masuk ke Panel</button>
    </div>

    <!-- Section Panel Utama -->
    <div class="glass-card wide" id="mainSection" style="display: none; position: relative;">
        <h1 class="title">Control Panel Wasit</h1>
        
        <div class="match-selector">
            <div class="form-group">
                <label for="cabang_lomba">Filter Cabang Lomba</label>
                <select id="cabang_lomba" class="form-control" onchange="loadMatches()">
                    <option value="" disabled selected>-- Pilih Cabang --</option>
                    <option value="Ganda Putra pertandingan basket">Ganda Putra pertandingan basket</option>
                    <option value="Ganda Putra Tenis meja">Ganda Putra Tenis meja</option>
                    <option value="Ganda Putra Volly">Ganda Putra Volly</option>
                    <option value="Ganda Putri pertandingan basket">Ganda Putri pertandingan basket</option>
                    <option value="Ganda Putri Tenis meja">Ganda Putri Tenis meja</option>
                    <option value="Ganda Putri Volly">Ganda Putri Volly</option>
                </select>
            </div>
            <div class="form-group" id="matchSelectGroup" style="display: none;">
                <label for="match_select">Pilih Pertandingan (Berjalan / Belum Mulai)</label>
                <select id="match_select" class="form-control" onchange="selectMatch()">
                    <option value="" disabled selected>-- Sedang Memuat... --</option>
                </select>
            </div>
        </div>

        <!-- Panel Skor -->
        <div id="scorePanel" style="display: none; animation: fadeIn 0.5s ease;">
            <div style="text-align: center; margin-bottom: 1rem;">
                <span class="vs-badge" id="babak_info">Babak</span>
            </div>
            
            <div id="state_info_container" class="state-info" style="display: none;">
                <!-- Dinamis diisi JS (contoh: Set 2, dsb) -->
            </div>

            <div class="match-grid">
                <!-- Team A -->
                <div class="team-col">
                    <div class="team-name" id="nama_tim_A">Tim A</div>
                    <div class="score-display text-blue" id="skor_A">0</div>
                    <div class="controls" id="controls_A">
                        <!-- Tombol dinamis -->
                    </div>
                </div>

                <div class="vs-badge">VS</div>

                <!-- Team B -->
                <div class="team-col">
                    <div class="team-name" id="nama_tim_B">Tim B</div>
                    <div class="score-display text-red" id="skor_B">0</div>
                    <div class="controls" id="controls_B">
                        <!-- Tombol dinamis -->
                    </div>
                </div>
            </div>

        </div>

        <div class="end-match-section" id="manual_end_section" style="display: none; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; margin-top: 2rem;">
            <div class="form-group" style="max-width: 300px; margin: 0 auto 10px auto;">
                <label for="pemenang_select" style="font-size: 0.9rem;">Akhiri Manual (Waktu Habis/WO)</label>
                <select id="pemenang_select" class="form-control" style="font-size: 0.9rem; padding: 8px;">
                </select>
            </div>
            <button class="btn btn-success" onclick="endMatchManual()" style="display: block; margin: 0 auto; font-size: 0.9rem;">TUTUP PERTANDINGAN</button>
        </div>

        <!-- Tombol Keluar di Bawah -->
        <div style="text-align: center; margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid rgba(255, 255, 255, 0.1);">
            <button class="btn btn-danger" onclick="logout()" style="padding: 10px 30px; font-weight: bold; background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.5); display: inline-flex; align-items: center; justify-content: center;">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                KELUAR DARI PANEL WASIT
            </button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/wasit.js"></script>
</body>
</html>
