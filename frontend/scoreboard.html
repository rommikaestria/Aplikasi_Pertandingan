<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Score All Matches</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .scoreboard-container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--header-bg);
            padding: 1.2rem 2rem;
            border-radius: 12px 12px 0 0;
            border: 1px solid var(--border-color);
            border-bottom: none;
            box-shadow: 0 -10px 20px var(--box-shadow);
        }
        .live-indicator {
            display: inline-block;
            width: 14px;
            height: 14px;
            background: var(--danger);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px var(--danger);
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .sport-section {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px var(--box-shadow);
            animation: fadeIn 0.5s ease;
        }
        .sport-title {
            background: linear-gradient(90deg, var(--sport-title-bg1), var(--sport-title-bg2));
            padding: 1rem 1.5rem;
            font-weight: 800;
            color: var(--text-main);
            border-bottom: 2px solid var(--border-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .match-row {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }
        .match-row:hover {
            background: var(--row-hover);
        }
        .match-row:last-child {
            border-bottom: none;
        }
        
        .m-status {
            width: 120px;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .m-status.ongoing {
            color: var(--danger);
            font-weight: 800;
        }
        .m-team-a {
            flex: 1;
            text-align: right;
            font-weight: 600;
            padding-right: 1.5rem;
            font-size: 1.1rem;
        }
        .m-score {
            background: var(--score-bg);
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            font-weight: 900;
            font-size: 1.4rem;
            letter-spacing: 2px;
            min-width: 90px;
            text-align: center;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            box-shadow: inset 0 2px 4px var(--box-shadow);
            font-variant-numeric: tabular-nums;
        }
        .m-score.live-score {
            color: #fbbf24; /* Kuning terang untuk skor live */
            border-color: rgba(251, 191, 36, 0.3);
        }
        .m-team-b {
            flex: 1;
            text-align: left;
            font-weight: 600;
            padding-left: 1.5rem;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="scoreboard-container">
        <h1 class="title" style="margin-bottom: 2rem;">Global Live Scores</h1>
        
        <div class="header-bar">
            <div style="font-weight: 800; font-size: 1.2rem; display: flex; align-items: center;">
                <span class="live-indicator"></span>LIVE MATCHES
            </div>
            <div style="color: var(--text-muted); font-size: 0.9rem; font-weight: 600;">
                <span style="display:inline-block; margin-right: 5px;">🔄</span> Auto-updates every 3s
            </div>
        </div>

        <div id="livescore_container">
            <div style="text-align:center; padding: 4rem; background: var(--card-bg); color: var(--text-muted); border-radius: 0 0 12px 12px; border: 1px solid var(--border-color);">
                Memuat data pertandingan...
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/score.js"></script>
</body>
</html>
